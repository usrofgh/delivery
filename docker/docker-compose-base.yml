services:
  db:
    image: postgres:14-alpine
    container_name: db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $POSTGRES_USER -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  broker:
    image: rabbitmq:4.2-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    volumes:
      - broker_data:/var/lib/rabbitmq

  celery:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: celery
#    environment:
#      RABBITMQ_HOST: ${RABBITMQ_HOST}
#      RABBITMQ_VHOST: ${RABBITMQ_VHOST}
#      RABBITMQ_PORT: ${RABBITMQ_PORT}
#      RABBITMQ_USER: ${RABBITMQ_USER}
#      RABBITMQ_PASS: ${RABBITMQ_PASS}

    command: celery -A bootstrap.celery_app:celery_app worker -l INFO
    depends_on:
      - broker

  flower:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: flower
#    environment:
#      RABBITMQ_HOST: ${RABBITMQ_HOST}
#      RABBITMQ_VHOST: ${RABBITMQ_VHOST}
#      RABBITMQ_PORT: ${RABBITMQ_PORT}
#      RABBITMQ_USER: ${RABBITMQ_USER}
#      RABBITMQ_PASS: ${RABBITMQ_PASS}

    command: celery -A bootstrap.celery_app:celery_app flower -l INFO
    depends_on:
      - broker


  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: app
    command: sh -c "alembic -c infrastracture/db/alembic/alembic.ini upgrade head && gunicorn -k uvicorn.workers.UvicornWorker 'bootstrap.app_factory:create_app()' --workers 4 --bind 0.0.0.0:8000 --log-level info"
    depends_on:
      db:
        condition: service_healthy


volumes:
  db_data:
  broker_data: